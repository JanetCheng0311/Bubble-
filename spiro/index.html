<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Draw glowing spirograph curves. Tune the gears, regenerate, and save your art.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230a0a12'/%3E%3Cg fill='none' stroke-width='3'%3E%3Ccircle cx='32' cy='32' r='20' stroke='%23ff5fa8'/%3E%3Ccircle cx='32' cy='32' r='11' stroke='%235fd0ff'/%3E%3C/g%3E%3C/svg%3E">
<title>Spiro — Playground</title>
<style>
  :root{ --white:#fff; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{background:#0a0a12;color:var(--white);font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    user-select:none;-webkit-user-select:none;touch-action:none}
  canvas{position:fixed;inset:0;width:100%;height:100%;display:block}
  header{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:baseline;gap:24px;
    padding:22px clamp(20px,4vw,40px);pointer-events:none;font-size:14px;font-weight:500}
  header a,header button{pointer-events:auto;font:inherit;color:var(--white);background:none;border:none;cursor:pointer;
    text-decoration:none;padding:2px 0;border-bottom:1px solid transparent;transition:border-color .15s}
  header a:hover,header button:hover{border-bottom-color:var(--white)}
  header .title{font-weight:600;margin-right:auto;pointer-events:none}
  header .title em{font-style:normal;opacity:.55;font-weight:400;margin-left:10px}
  header .spacer{flex:0 0 8px}
  .panel{position:fixed;left:clamp(20px,4vw,40px);bottom:22px;z-index:10;display:flex;flex-direction:column;gap:9px;font-size:13px;font-weight:500}
  .panel label{display:flex;align-items:center;gap:12px}
  .panel label span{width:46px;opacity:.7}
  input[type=range]{-webkit-appearance:none;appearance:none;width:150px;height:22px;background:transparent;cursor:pointer}
  input[type=range]::-webkit-slider-runnable-track{height:1px;background:rgba(255,255,255,.5)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:13px;height:13px;border-radius:50%;background:var(--white);margin-top:-6px}
  input[type=range]::-moz-range-track{height:1px;background:rgba(255,255,255,.5)}
  input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--white);border:none}
  .hint{position:fixed;right:clamp(20px,4vw,40px);bottom:22px;z-index:10;font-size:12px;opacity:.5;max-width:20ch;text-align:right;line-height:1.6}
  @media (max-width:640px){.hint{display:none}header{gap:16px;padding:16px}}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<header>
  <span class="title">Spiro<em>spirograph curves</em></span>
  <button id="neu">new</button>
  <button id="theme">color</button>
  <button id="save">save png</button>
  <span class="spacer"></span>
  <a href="../">playground</a>
</header>
<div class="panel">
  <label><span>outer</span><input type="range" id="rR" min="60" max="200" value="140"></label>
  <label><span>inner</span><input type="range" id="rr" min="20" max="160" value="83"></label>
  <label><span>pen</span><input type="range" id="rd" min="20" max="160" value="95"></label>
</div>
<p class="hint">drag the gears, tap new to surprise yourself</p>
<script>
(() => {
"use strict";
const canvas=document.getElementById("stage"), ctx=canvas.getContext("2d");
const reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
let W,H,cx,cy,scale;
function resize(){ W=innerWidth;H=innerHeight;canvas.width=W;canvas.height=H;cx=W/2;cy=H/2;scale=Math.min(W,H)/520; restart(); }
addEventListener("resize",resize);

const THEMES=[ [330,30], [200,80], [140,40], [40,300] ]; // [startHue, hueSpan]
let theme=0;
const $=id=>document.getElementById(id);
let R=140,r=83,d=95, theta=0, period=0, lastX=0,lastY=0, hue0=330;

function gcd(x,y){ x=Math.round(x);y=Math.round(y); while(y){[x,y]=[y,x%y];} return x; }
function point(t){
  const k=R-r;
  const x=cx + (k*Math.cos(t) + d*Math.cos(k/r*t))*scale;
  const y=cy + (k*Math.sin(t) - d*Math.sin(k/r*t))*scale;
  return [x,y];
}
function restart(){
  R=+$("rR").value; r=+$("rr").value; d=+$("rd").value;
  hue0=THEMES[theme][0];
  ctx.fillStyle="#0a0a12"; ctx.fillRect(0,0,W,H);
  theta=0;
  period=Math.PI*2*(r/gcd(R,r));     // full closed curve
  [lastX,lastY]=point(0);
}

function loop(){
  ctx.globalCompositeOperation="lighter";
  ctx.lineCap="round";
  const span=THEMES[theme][1];
  const stepsPerFrame=reduce?4000:Math.max(60,Math.round(period*40));
  const dT=period/ (period*40);       // ~constant arc speed
  for(let s=0;s<stepsPerFrame && theta<period;s++){
    theta+=dT;
    const [x,y]=point(theta);
    const prog=theta/period;
    const hue=(hue0+prog*span)%360;
    ctx.strokeStyle=`hsla(${hue},90%,62%,0.5)`;
    ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.stroke();
    lastX=x; lastY=y;
  }
  ctx.globalCompositeOperation="source-over";
  requestAnimationFrame(loop);
}

["rR","rr","rd"].forEach(id=>$(id).addEventListener("input",restart));
$("neu").addEventListener("click",()=>{ $("rR").value=80+(Math.random()*120|0); $("rr").value=25+(Math.random()*120|0); $("rd").value=30+(Math.random()*120|0); theme=(Math.random()*THEMES.length)|0; restart(); });
$("theme").addEventListener("click",()=>{ theme=(theme+1)%THEMES.length; restart(); });
$("save").addEventListener("click",()=>{ const a=document.createElement("a"); a.download="spiro.png"; a.href=canvas.toDataURL("image/png"); a.click(); });

resize();
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
