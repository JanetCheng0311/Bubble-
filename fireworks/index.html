<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="A pixel firework generator. Tap to launch bursts of tiny glowing pixels into the night.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23060608'/%3E%3Cg fill='white'%3E%3Crect x='30' y='10' width='4' height='4'/%3E%3Crect x='44' y='20' width='4' height='4'/%3E%3Crect x='16' y='22' width='4' height='4'/%3E%3Crect x='38' y='38' width='4' height='4'/%3E%3Crect x='22' y='40' width='4' height='4'/%3E%3Crect x='30' y='26' width='4' height='4'/%3E%3C/g%3E%3C/svg%3E">
<title>Fireworks — Playground</title>
<style>
  :root{ --bg:#060608; --white:#fff; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    background:var(--bg);color:var(--white);
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    user-select:none;-webkit-user-select:none;
    touch-action:none;
  }
  canvas{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:crosshair}

  header{
    position:fixed;top:0;left:0;right:0;z-index:10;
    display:flex;align-items:baseline;gap:24px;
    padding:22px clamp(20px,4vw,40px);
    pointer-events:none;
    font-size:14px;font-weight:500;
  }
  header a, header button{
    pointer-events:auto;
    font:inherit;color:var(--white);
    background:none;border:none;cursor:pointer;text-decoration:none;padding:2px 0;
    border-bottom:1px solid transparent;
    transition:border-color .15s ease, opacity .15s ease;
  }
  header a:hover, header button:hover{border-bottom-color:var(--white)}
  header a:focus-visible, header button:focus-visible{outline:2px solid var(--white);outline-offset:4px}
  header .title{font-weight:600;margin-right:auto;pointer-events:none}
  header .title em{font-style:normal;opacity:.55;font-weight:400;margin-left:10px}
  header .spacer{flex:0 0 8px}

  .panel{
    position:fixed;left:clamp(20px,4vw,40px);bottom:22px;z-index:10;
    display:flex;flex-direction:column;gap:12px;
    font-size:13px;font-weight:500;
  }
  .sliders{display:flex;flex-direction:column;gap:9px}
  .sliders label{display:flex;align-items:center;gap:12px}
  .sliders label span{width:46px;opacity:.7}
  input[type=range]{
    -webkit-appearance:none;appearance:none;width:140px;height:22px;background:transparent;cursor:pointer;
  }
  input[type=range]::-webkit-slider-runnable-track{height:1px;background:rgba(255,255,255,.5)}
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:13px;height:13px;border-radius:50%;
    background:var(--white);margin-top:-6px;
  }
  input[type=range]::-moz-range-track{height:1px;background:rgba(255,255,255,.5)}
  input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--white);border:none}

  .toggles{display:flex;gap:18px}
  .toggles button{
    font:inherit;font-size:13px;font-weight:500;color:var(--white);
    background:none;border:none;cursor:pointer;padding:2px 0;
    opacity:.5;border-bottom:1px solid transparent;
    transition:opacity .15s ease, border-color .15s ease;
  }
  .toggles button:hover{opacity:.8}
  .toggles button.on{opacity:1;border-bottom-color:var(--white)}

  .hint{
    position:fixed;right:clamp(20px,4vw,40px);bottom:22px;z-index:10;
    font-size:12px;font-weight:400;opacity:.5;max-width:22ch;text-align:right;line-height:1.6;
  }
  @media (max-width:640px){
    .hint{display:none}
    header{gap:16px;padding:16px}
    .panel{bottom:16px;left:16px}
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<header>
  <span class="title">Fireworks<em>pixel firework generator</em></span>
  <button id="btnLaunch">launch</button>
  <button id="btnClear">clear</button>
  <button id="btnSave">save png</button>
  <span class="spacer"></span>
  <a href="../">playground</a>
</header>

<div class="panel">
  <div class="sliders">
    <label><span>burst</span><input type="range" id="rBurst" min="40" max="600" value="240"></label>
    <label><span>gravity</span><input type="range" id="rGrav" min="0" max="100" value="32"></label>
    <label><span>trails</span><input type="range" id="rTrail" min="2" max="40" value="12"></label>
  </div>
  <div class="toggles">
    <button id="tAuto" aria-pressed="true" class="on">auto</button>
    <button id="tRainbow" aria-pressed="false">rainbow</button>
  </div>
</div>

<p class="hint">tap the sky to launch a firework</p>

<script>
(() => {
"use strict";
const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d");
const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
const DPR = Math.min(devicePixelRatio || 1, 2);
const TWO_PI = Math.PI*2;
let W = 0, H = 0;

function resize(){
  W = innerWidth; H = innerHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  // start from a clean black field
  ctx.fillStyle = "#060608"; ctx.fillRect(0,0,W,H);
}
addEventListener("resize", resize);
resize();

/* ---------------- settings ---------------- */
const set = {
  burst: 240,
  grav: 0.09,
  trail: 0.12,      // 0..1 fade-to-black amount per frame (higher = shorter trails)
  auto: true,
  rainbow: false,
};

const rnd = (a=1,b) => b===undefined ? Math.random()*a : a + Math.random()*(b-a);

/* ---------------- particles ---------------- */
const rockets = [];
const sparks = [];
const MAX_SPARKS = 6000;

function launch(tx, ty){
  // rocket rises from the bottom at the tap's x and explodes near the tap point
  const targetY = ty != null ? ty : rnd(H*0.12, H*0.5);
  const x = tx != null ? tx : rnd(W*0.15, W*0.85);
  // initial upward speed to (roughly) reach targetY under gravity
  const dist = H - targetY;
  const vy = -Math.sqrt(2 * set.grav * dist) - rnd(0, 1.2);
  const hue = set.rainbow ? rnd(0,360) : pickHue();
  rockets.push({ x, y: H, vy, vx: rnd(-0.4,0.4), hue, targetY });
}

const HUES = [0, 18, 45, 120, 190, 215, 280, 320]; // vivid firework colors
function pickHue(){ return HUES[(Math.random()*HUES.length)|0] + rnd(-10,10); }

function explode(x, y, hue){
  const n = set.burst;
  const ring = Math.random() < 0.35;              // some bursts are crisp rings
  const baseSpeed = rnd(2.2, 4.2);
  for (let i=0;i<n;i++){
    if (sparks.length >= MAX_SPARKS) sparks.shift();
    const a = (i/n)*TWO_PI + rnd(-0.1,0.1);
    const sp = ring ? baseSpeed*(0.9+rnd(0,0.2)) : baseSpeed*Math.sqrt(rnd(0.04,1));
    const h = set.rainbow ? (hue + i/n*360) % 360 : hue + rnd(-14,14);
    sparks.push({
      x, y,
      vx: Math.cos(a)*sp,
      vy: Math.sin(a)*sp,
      hue: h,
      light: rnd(55,80),
      life: 1,
      decay: rnd(0.006, 0.018),
      size: Math.random() < 0.15 ? 3 : 2,        // pixels, a few brighter
      flick: Math.random() < 0.4,
    });
  }
}

/* ---------------- loop ---------------- */
let lastAuto = 0;
function frame(t){
  // fade the previous frame toward black -> pixel trails
  ctx.globalCompositeOperation = "source-over";
  ctx.fillStyle = `rgba(6,6,8,${set.trail})`;
  ctx.fillRect(0,0,W,H);

  // additive so overlapping sparks glow
  ctx.globalCompositeOperation = "lighter";

  // rockets
  for (let i=rockets.length-1;i>=0;i--){
    const r = rockets[i];
    r.vy += set.grav*0.5;
    r.x += r.vx; r.y += r.vy;
    // bright rising pixel + faint spark trail
    ctx.fillStyle = `hsl(${r.hue},90%,82%)`;
    ctx.fillRect(r.x|0, r.y|0, 2, 3);
    if (r.vy >= -0.6 || r.y <= r.targetY){
      explode(r.x, r.y, r.hue);
      rockets.splice(i,1);
    }
  }

  // sparks
  for (let i=sparks.length-1;i>=0;i--){
    const s = sparks[i];
    s.vx *= 0.985; s.vy *= 0.985;
    s.vy += set.grav;
    s.x += s.vx; s.y += s.vy;
    s.life -= s.decay;
    if (s.life <= 0){ sparks.splice(i,1); continue; }
    const a = s.flick ? s.life * (0.6 + Math.random()*0.4) : s.life;
    ctx.fillStyle = `hsla(${s.hue},100%,${s.light}%,${a})`;
    ctx.fillRect(s.x|0, s.y|0, s.size, s.size);
  }
  ctx.globalCompositeOperation = "source-over";

  // auto launches
  if (set.auto && !reduceMotion && t - lastAuto > rnd(550, 1300)){
    launch();
    if (Math.random() < 0.3) launch();
    lastAuto = t;
  }

  requestAnimationFrame(frame);
}

/* ---------------- controls ---------------- */
const $ = id => document.getElementById(id);
$("rBurst").addEventListener("input", e => set.burst = +e.target.value);
$("rGrav").addEventListener("input", e => set.grav = +e.target.value / 360);   // 0..~0.28
$("rTrail").addEventListener("input", e => set.trail = +e.target.value / 100); // 0.02..0.40
set.grav = +$("rGrav").value / 360;
set.trail = +$("rTrail").value / 100;

function toggle(btn, fn){
  const on = btn.classList.toggle("on");
  btn.setAttribute("aria-pressed", on);
  fn(on);
}
$("tAuto").addEventListener("click", e => toggle(e.currentTarget, v => set.auto = v));
$("tRainbow").addEventListener("click", e => toggle(e.currentTarget, v => set.rainbow = v));

$("btnLaunch").addEventListener("click", () => { launch(); if (Math.random()<0.4) launch(); });
$("btnClear").addEventListener("click", () => {
  rockets.length = 0; sparks.length = 0;
  ctx.globalCompositeOperation = "source-over";
  ctx.fillStyle = "#060608"; ctx.fillRect(0,0,W,H);
});
$("btnSave").addEventListener("click", () => {
  const a = document.createElement("a");
  a.download = "fireworks.png"; a.href = canvas.toDataURL("image/png"); a.click();
});

canvas.addEventListener("pointerdown", e => launch(e.clientX, e.clientY));

// open with a couple of bursts
launch(W*0.35, H*0.32);
launch(W*0.65, H*0.42);
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
